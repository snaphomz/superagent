services:
  - type: web
    name: slack-personality-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slackbot-db
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: TARGET_CHANNEL_ID
        sync: false
      - key: YOUR_USER_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AUTO_SEND_THRESHOLD
        value: 85
      - key: RESPONSE_DELAY_SECONDS
        value: 3
      - key: MAX_CONTEXT_MESSAGES
        value: 20

databases:
  - name: slackbot-db
    plan: free
    databaseName: slackbot
    user: slackbot
